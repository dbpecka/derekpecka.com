services:
  web:
    image: nginx:1.27-alpine
    container_name: derekpecka-web
    restart: unless-stopped
    ports:
      - "20001:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
